<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unblocked Games Premium+ | Play 1000+ Free Games</title>
  <meta name="description" content="Unblocked Games Premium+ — Play over 1000 free online games at school or work. No downloads, no installs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header id="siteHeader">
    <div class="header-inner">
      <div class="logo" onclick="filterByCategory('All')">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Unblocked <span class="logo-accent">Premium+</span></span>
      </div>
      <div class="search-wrapper">
        <span class="search-icon-left">🔍</span>
        <input type="text" id="searchBar" placeholder="Search 1000+ games…" autocomplete="off" />
        <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
      </div>
      <nav class="header-nav">
        <a href="#" class="nav-link" onclick="filterByCategory('All');return false;">Home</a>
        <a href="#" class="nav-link" onclick="filterByCategory('IO Games');return false;">Popular</a>
        <a href="#" class="nav-link" onclick="filterByCategory('Action');return false;">New</a>
        <button class="nav-link hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>
      </nav>
    </div>
  </header>

  <!-- ═══ SIDEBAR OVERLAY ══════════════════════════════════ -->
  <div id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- ═══ APP LAYOUT ═══════════════════════════════════════ -->
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-title">CATEGORIES</div>
        <div id="categoryList"></div>
      </div>
    </aside>

    <main id="mainContent">
      <div class="game-count" id="gameCount">Loading games…</div>
      <div id="gameGrid"></div>
      <div id="sentinel"></div>
      <div id="loadingSpinner" class="loading-spinner" style="display:none">
        <div class="spinner-ring"></div>
        <span>Loading more games…</span>
      </div>
    </main>
  </div>

  <!-- ═══ GAME MODAL ════════════════════════════════════════ -->
  <div id="gameModal" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-box" id="modalBox">

      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Game</span>
        <div class="modal-controls">
          <a id="externalBtn" href="#" target="_blank" rel="noopener" class="modal-btn ext-btn" title="Open in new tab">↗ New Tab</a>
          <button class="modal-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
          <button class="modal-btn close-btn" onclick="closeModal()" title="Close">✕</button>
        </div>
      </div>

      <div class="iframe-wrapper" id="iframeWrapper">
        <iframe
          id="gameFrame"
          src="about:blank"
          allow="fullscreen; pointer-lock; autoplay"
          allowfullscreen
          title="Game"
        ></iframe>
      </div>
    </div>
  </div>

  <!-- ═══ BACK TO TOP ══════════════════════════════════════ -->
  <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">▲</button>

  <!-- ═══ FOOTER ═══════════════════════════════════════════ -->
  <footer id="siteFooter">
    <div class="footer-inner">
      <div class="footer-logo">⚡ Unblocked Games Premium+</div>
      <p class="footer-tagline">© 2025 Unblocked Games Premium+ — Play free unblocked games at school or work</p>
      <div class="footer-links">
        <a href="#">Privacy Policy</a><span>·</span>
        <a href="#">Contact</a><span>·</span>
        <a href="#">DMCA</a><span>·</span>
        <a href="#">About</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
